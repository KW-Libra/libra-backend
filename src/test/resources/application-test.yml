spring:
  datasource:
    url: jdbc:h2:mem:libra-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

libra:
  auth:
    jwt:
      secret: test-secret-with-at-least-thirty-two-bytes
  kis:
    enabled: false
