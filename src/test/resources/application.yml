spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:h2:mem:libra;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

libra:
  agent:
    base-url: http://localhost:8010
    connect-timeout-ms: 100
    read-timeout-ms: 100
    fallback-to-stub: true
  knowledge:
    local-dir:
    max-age-minutes: 240
