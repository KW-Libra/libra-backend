spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:h2:mem:libra;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

libra:
  auth:
    jwt:
      secret: test-secret-test-secret-test-secret-32bytes!
      access-ttl-minutes: 60
      issuer: libra-backend-test
    refresh:
      ttl-days: 14
    oauth:
      frontend-success-uri: http://localhost:5173/auth/callback
      frontend-failure-uri: http://localhost:5173/auth/callback
  agent:
    base-url: http://localhost:8010
    connect-timeout-ms: 100
    read-timeout-ms: 100
  knowledge:
    local-dir:
    max-age-minutes: 240
