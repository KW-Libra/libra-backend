spring:
  application:
    name: libra-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/libra}
    username: ${DB_USER:libra}
    password: ${DB_PASSWORD:libra}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway 가 스키마 단일 소스
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs
    url: /api/openapi
    config-url: /api/openapi/swagger-config
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true

libra:
  auth:
    jwt:
      secret: ${JWT_SECRET:please-change-me-to-a-long-random-secret-min-256-bits-for-prod-only-dev-default}
      ttl-seconds: ${JWT_TTL_SECONDS:86400}
      issuer: libra-api
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  agent:
    base-url: ${AGENT_BASE_URL:http://localhost:8000}
    connect-timeout: ${AGENT_CONNECT_TIMEOUT:5s}
    stream-timeout: ${AGENT_STREAM_TIMEOUT:30m}
  backtests:
    output-root: ${LIBRA_BACKTEST_OUTPUT_ROOT:/opt/libra/backtests}
    runner:
      enabled: ${LIBRA_BACKTEST_RUNNER_ENABLED:true}
      agent-repo-root: ${LIBRA_AGENT_REPO_ROOT:/opt/libra/backtest-agent/app}
      output-dir: ${LIBRA_BACKTEST_RUNNER_OUTPUT_DIR:/opt/libra/backtests/kr-objective-2020-2023-opendart-googlenews}
      fixture-file: ${LIBRA_BACKTEST_RUNNER_FIXTURE_FILE:comparison-fixture.pykrx-volume.strict.json}
      env-file: ${LIBRA_BACKTEST_RUNNER_ENV_FILE:/opt/libra/backtest-agent/app/.env.live.local}
      python-command: ${LIBRA_BACKTEST_RUNNER_PYTHON:}
      default-model: ${LIBRA_BACKTEST_RUNNER_MODEL:claude-haiku-4-5-20251001}
      default-governance-preset: ${LIBRA_BACKTEST_RUNNER_GOVERNANCE_PRESET:aggressive}
      default-execution-policy-mode: ${LIBRA_BACKTEST_RUNNER_EXECUTION_POLICY_MODE:RISK_TRIM_AND_REDISTRIBUTE}
      status-tail-lines: ${LIBRA_BACKTEST_RUNNER_STATUS_TAIL_LINES:20}
    public-rss-3y:
      validation-report-uri: ${LIBRA_BACKTEST_PUBLIC_RSS_3Y_VALIDATION_URI:s3://libra-backtests-271030592697-ap-northeast-2/backtests/public-rss-3y/validation.json}
      s3-region: ${LIBRA_BACKTEST_S3_REGION:${AWS_REGION:ap-northeast-2}}
      cache-ttl: ${LIBRA_BACKTEST_PUBLIC_RSS_3Y_CACHE_TTL:5m}
  ingest:
    workspace-root: ${LIBRA_INGEST_WORKSPACE_ROOT:/opt/libra/ingest/app}
    output-root: ${LIBRA_LIVE_INGEST_OUTPUT_ROOT:/opt/libra/backend/live-ingest}
    python-command: ${LIBRA_PYTHON_COMMAND:/opt/libra/ingest/.venv/bin/python}
    rss-limit: ${LIBRA_LIVE_INGEST_RSS_LIMIT:20}
    dart-limit: ${LIBRA_LIVE_INGEST_DART_LIMIT:100}
    report-limit: ${LIBRA_LIVE_INGEST_REPORT_LIMIT:20}
    report-pdf-pages: ${LIBRA_LIVE_INGEST_REPORT_PDF_PAGES:20}
    report-min-body-chars: ${LIBRA_LIVE_INGEST_REPORT_MIN_BODY_CHARS:500}
    timeout: ${LIBRA_LIVE_INGEST_TIMEOUT:15m}
  kis:
    enabled: ${KIS_ENABLED:false}
    trading-enabled: ${KIS_TRADING_ENABLED:false}
    environment: ${KIS_ENVIRONMENT:paper} # paper | prod
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
    account-number: ${KIS_ACCOUNT_NUMBER:}
    account-product-code: ${KIS_ACCOUNT_PRODUCT_CODE:01}
    hts-id: ${KIS_HTS_ID:}
    prod-base-url: ${KIS_PROD_BASE_URL:https://openapi.koreainvestment.com:9443}
    paper-base-url: ${KIS_PAPER_BASE_URL:https://openapivts.koreainvestment.com:29443}
    max-order-quantity: ${KIS_MAX_ORDER_QUANTITY:1000}
    max-order-amount: ${KIS_MAX_ORDER_AMOUNT:10000000}
    allowed-symbols: ${KIS_ALLOWED_SYMBOLS:}
    credential-encryption-key: ${KIS_CREDENTIAL_ENCRYPTION_KEY:}

logging:
  level:
    root: INFO
    com.libra: DEBUG
    org.springframework.security: INFO
