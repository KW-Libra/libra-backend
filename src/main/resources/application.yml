spring:
  application:
    name: libra-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/libra}
    username: ${DB_USER:libra}
    password: ${DB_PASSWORD:libra}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway 가 스키마 단일 소스
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs
    url: /api/openapi
    config-url: /api/openapi/swagger-config
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true

libra:
  auth:
    jwt:
      secret: ${JWT_SECRET:please-change-me-to-a-long-random-secret-min-256-bits-for-prod-only-dev-default}
      ttl-seconds: ${JWT_TTL_SECONDS:86400}
      issuer: libra-api
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  agent:
    base-url: ${AGENT_BASE_URL:http://localhost:8000}
    connect-timeout: ${AGENT_CONNECT_TIMEOUT:5s}
    stream-timeout: ${AGENT_STREAM_TIMEOUT:30m}
  kis:
    enabled: ${KIS_ENABLED:false}
    trading-enabled: ${KIS_TRADING_ENABLED:false}
    environment: ${KIS_ENVIRONMENT:paper} # paper | prod
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
    account-number: ${KIS_ACCOUNT_NUMBER:}
    account-product-code: ${KIS_ACCOUNT_PRODUCT_CODE:01}
    hts-id: ${KIS_HTS_ID:}
    prod-base-url: ${KIS_PROD_BASE_URL:https://openapi.koreainvestment.com:9443}
    paper-base-url: ${KIS_PAPER_BASE_URL:https://openapivts.koreainvestment.com:29443}
    max-order-quantity: ${KIS_MAX_ORDER_QUANTITY:1000}
    max-order-amount: ${KIS_MAX_ORDER_AMOUNT:10000000}
    allowed-symbols: ${KIS_ALLOWED_SYMBOLS:}

logging:
  level:
    root: INFO
    com.libra: DEBUG
    org.springframework.security: INFO
