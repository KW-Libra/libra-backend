name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-prod
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar
          cp build/libs/*.jar libra-backend.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact
        env:
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
        run: |
          set -euo pipefail
          : "${DEPLOY_BUCKET:?Set repository variable DEPLOY_BUCKET}"
          aws s3 cp libra-backend.jar "s3://${DEPLOY_BUCKET}/deploy-artifacts/backend/${GITHUB_SHA}/libra-backend.jar"

      - name: Deploy through SSM
        env:
          API_INSTANCE_ID: ${{ vars.API_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
        run: |
          set -euo pipefail
          : "${API_INSTANCE_ID:?Set repository variable API_INSTANCE_ID}"
          : "${DEPLOY_BUCKET:?Set repository variable DEPLOY_BUCKET}"

          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -eu",
              "test -r /opt/libra/backend/.env || { echo 'Missing /opt/libra/backend/.env. Run the initial backend bootstrap before GitHub Actions deploy.' >&2; exit 2; }",
              "aws s3 cp s3://${DEPLOY_BUCKET}/deploy-artifacts/backend/${GITHUB_SHA}/libra-backend.jar /tmp/libra-backend.jar",
              "install -o libra -g libra -m 0640 /tmp/libra-backend.jar /opt/libra/backend/libra-backend.jar",
              "systemctl daemon-reload",
              "systemctl restart libra-backend",
              "for i in \$(seq 1 60); do if curl -fsS http://127.0.0.1:8080/health; then exit 0; fi; sleep 3; done",
              "systemctl status libra-backend --no-pager || true",
              "journalctl -u libra-backend -n 120 --no-pager",
              "exit 1"
            ]
          }
          EOF

          command_id="$(aws ssm send-command \
            --instance-ids "${API_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy libra-backend ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)"

          set +e
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${API_INSTANCE_ID}"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${API_INSTANCE_ID}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          exit "${wait_status}"
